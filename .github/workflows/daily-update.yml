name: Daily Regulatory Monitoring Update

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC every day
  workflow_dispatch:        # allow manual runs

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch regulatory updates
        run: python tools/fetch_updates.py

      - name: Categorize items and compute risk scores
        run: python tools/categorize_items.py

      - name: Validate data JSON
        run: python -c "import json; json.load(open('data/updates.json')); print('data/updates.json is valid JSON')"

      - name: Validate site integrity
        run: python tools/check_site.py
        continue-on-error: true

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/updates.json
          git commit -m "chore: daily regulatory data update [$(date -u '+%Y-%m-%d')]" || echo "No data changes to commit"
          git push || echo "Nothing to push"
